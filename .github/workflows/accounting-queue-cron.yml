name: Accounting Queue Manual Trigger
on:
  workflow_dispatch:

jobs:
  process-accounting-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger accounting queue worker
        env:
          ACCOUNTING_QUEUE_WORKER_URL: ${{ secrets.ACCOUNTING_QUEUE_WORKER_URL }}
          ACCOUNTING_QUEUE_CRON_KEY: ${{ secrets.ACCOUNTING_QUEUE_CRON_KEY }}
        run: |
          response="$(curl --fail-with-body -sS -X POST "${ACCOUNTING_QUEUE_WORKER_URL}" \
            -H "Content-Type: application/json" \
            -H "x-cron-key: ${ACCOUNTING_QUEUE_CRON_KEY}" \
            -d '{"limit":100}')"

          echo "$response"

          echo "$response" | jq -e '.success == true' >/dev/null
          echo "$response" | jq -e '([.results[]? | select(.success == false)] | length) == 0' >/dev/null
