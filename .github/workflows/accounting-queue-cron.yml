name: Accounting Queue Cron
on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  process-accounting-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger accounting queue worker
        run: |
          curl -sS -X POST "${{ secrets.ACCOUNTING_QUEUE_WORKER_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-cron-key: ${{ secrets.ACCOUNTING_QUEUE_CRON_KEY }}" \
            -d '{"limit":100}'
