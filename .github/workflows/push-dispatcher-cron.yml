name: Push Dispatcher Cron
on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call push dispatcher
        run: |
          curl -sS -X POST "${{ secrets.PUSH_DISPATCHER_URL }}" \
            -H "Authorization: Bearer ${{ secrets.PUSH_DISPATCHER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"limit":100}'
