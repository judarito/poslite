name: Push Dispatcher Manual Trigger
on:
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call push dispatcher
        env:
          PUSH_DISPATCHER_URL: ${{ secrets.PUSH_DISPATCHER_URL }}
          PUSH_DISPATCHER_SECRET: ${{ secrets.PUSH_DISPATCHER_SECRET }}
        run: |
          curl -sS -X POST "${PUSH_DISPATCHER_URL}" \
            -H "Authorization: Bearer ${PUSH_DISPATCHER_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"limit":100}'
